{% extends "base.html" %}
{% block title %}Shopping List — LifeSource{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1>Shopping List</h1>
    </div>
</div>

<div class="form-card">
    <form hx-post="/api/shopping-list"
          hx-target="#list-items"
          hx-swap="innerHTML"
          hx-on::after-request="this.reset()"
          class="inline-form">
        <input name="item_name" placeholder="Add item…" required class="flex-1">
        <input name="quantity" type="number" step="0.01" value="1" class="w-20">
        <input name="unit" placeholder="Unit" class="w-24">
        <button type="submit" class="btn btn-primary">Add</button>
    </form>
</div>

<div id="list-items">
    {% include "partials/shopping_list_items.html" %}
</div>
{% endblock %}
