<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LifeSource{% endblock %}</title>
    <meta name="theme-color" content="#1c1917">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="LifeSource">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/static/icons/lifesource.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icons/lifesource.svg">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        /* ── Design Tokens ── */
        :root {
            --ink: #1c1917;
            --ink-secondary: #44403c;
            --ink-muted: #a8a29e;
            --ink-faint: #d6d3d1;
            --surface: #faf9f7;
            --surface-raised: #ffffff;
            --surface-warm: #f5f1eb;
            --surface-sunken: #f0ece4;
            --border: rgba(28, 25, 23, 0.07);
            --border-strong: rgba(28, 25, 23, 0.13);
            --accent: #b7461a;
            --accent-hover: #9c3b15;
            --accent-subtle: #fdf2ec;
            --save: #1a7a34;
            --save-subtle: #edf7ef;
            --alert: #c47a0a;
            --alert-subtle: #fef8ed;
            --store-heb: #cc1530;
            --store-costco: #004990;
            --store-ranch: #b8910a;
            --store-hmart: #167a40;
            --store-traderjoes: #c2372e;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-pill: 100px;
            --shadow-sm: 0 1px 2px rgba(28,25,23,0.04);
            --shadow-md: 0 2px 8px rgba(28,25,23,0.06), 0 1px 2px rgba(28,25,23,0.04);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ── Reset ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            background: var(--surface);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
        }
        a { color: inherit; text-decoration: none; }
        img { display: block; max-width: 100%; }
        button { cursor: pointer; font-family: inherit; }
        input, select, textarea { font-family: inherit; }

        .font-display { font-family: 'DM Serif Display', Georgia, serif; }

        /* ── Navigation ── */
        .site-nav {
            background: var(--ink);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            max-width: 72rem;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 3.25rem;
            padding: 0 clamp(1rem, 3vw, 2rem);
        }
        .nav-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            color: #fff;
            letter-spacing: -0.02em;
            margin-right: 1.75rem;
            flex-shrink: 0;
        }
        .nav-logo span { color: var(--accent); opacity: 0.9; }

        .nav-group {
            display: flex;
            align-items: center;
            gap: 0;
        }
        .nav-group + .nav-group {
            margin-left: 0.25rem;
            padding-left: 0.75rem;
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .nav-link {
            color: rgba(255,255,255,0.45);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 1rem 0.65rem;
            border-bottom: 2px solid transparent;
            transition: color 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
            white-space: nowrap;
        }
        .nav-link:hover { color: rgba(255,255,255,0.8); }
        .nav-link.active {
            color: #fff;
            border-bottom-color: var(--accent);
        }
        .nav-spacer { flex: 1; }
        .nav-icon {
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            padding: 0.75rem 0.5rem;
            transition: color 0.15s;
        }
        .nav-icon:hover { color: rgba(255,255,255,0.85); }

        /* Mobile hamburger */
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 1.25rem;
            padding: 0.5rem;
            margin-left: auto;
        }
        .nav-menu { display: contents; }

        /* ── Main ── */
        main {
            max-width: 72rem;
            margin: 0 auto;
            padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 3vw, 2rem);
            min-height: calc(100vh - 3.25rem);
        }

        /* ── Page Header ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            gap: 1rem;
            flex-wrap: wrap;
        }
        .page-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.6rem, 3.5vw, 2.25rem);
            letter-spacing: -0.025em;
            line-height: 1.15;
            color: var(--ink);
        }
        .page-header .subtitle {
            color: var(--ink-muted);
            font-size: 0.82rem;
            margin-top: 0.2rem;
        }

        /* ── Filter Bar ── */
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .filter-bar select,
        .filter-bar input[type="search"] {
            font-size: 0.82rem;
            padding: 0.45rem 0.7rem;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: var(--surface-raised);
            color: var(--ink);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .filter-bar select:focus,
        .filter-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }
        .filter-bar input[type="search"] { width: 200px; }

        /* ── Stats Row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1px;
            background: var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }
        .stat-card {
            background: var(--surface-raised);
            padding: 1.1rem 1.25rem;
        }
        .stat-value {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.4rem, 2.5vw, 1.75rem);
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-muted);
            font-weight: 600;
            margin-top: 0.15rem;
        }

        /* ── Section ── */
        .section-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--ink-muted);
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        /* ── Category Quick Nav ── */
        .cat-nav {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-bottom: 1.75rem;
        }
        .cat-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.65rem;
            border-radius: var(--radius-pill);
            font-size: 0.72rem;
            font-weight: 600;
            background: var(--surface-raised);
            color: var(--ink-secondary);
            border: 1px solid var(--border-strong);
            transition: all 0.2s var(--ease-out);
            text-decoration: none;
        }
        .cat-pill:hover {
            background: var(--ink);
            color: #fff;
            border-color: var(--ink);
            transform: translateY(-1px);
        }
        .cat-pill .count {
            color: var(--ink-muted);
            font-weight: 400;
            font-size: 0.68rem;
        }
        .cat-pill:hover .count { color: rgba(255,255,255,0.6); }

        /* ── Category Section Headers ── */
        .cat-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            padding: 0.65rem 0;
            border-bottom: 2px solid var(--ink);
            position: sticky;
            top: 3.25rem;
            background: var(--surface);
            z-index: 10;
        }
        .cat-header-emoji { font-size: 1.15rem; }
        .cat-header-label {
            font-family: 'DM Serif Display', serif;
            font-size: 1.2rem;
            letter-spacing: -0.015em;
        }
        .cat-header-count {
            font-size: 0.72rem;
            color: var(--ink-muted);
            margin-left: 0.15rem;
        }

        /* ── Deal Card ── */
        .deal-card {
            display: grid;
            grid-template-columns: 64px 1fr auto;
            gap: 0.85rem;
            align-items: start;
            padding: 0.85rem 0;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s var(--ease-out), border-radius 0.15s;
        }
        .deal-card:last-child { border-bottom: none; }
        .deal-card:hover {
            background: var(--surface-warm);
            margin: 0 -0.65rem;
            padding: 0.85rem 0.65rem;
            border-radius: var(--radius-md);
        }
        .deal-img {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--surface-sunken);
        }
        .deal-emoji {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            background: var(--surface-sunken);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .deal-info h3 {
            font-weight: 600;
            font-size: 0.88rem;
            line-height: 1.35;
            margin-bottom: 0.15rem;
            color: var(--ink);
        }
        .deal-meta {
            font-size: 0.72rem;
            color: var(--ink-muted);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .store-tag {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.12rem 0.35rem;
            border-radius: 3px;
            color: #fff;
        }
        .store-tag.heb { background: var(--store-heb); }
        .store-tag.costco { background: var(--store-costco); }
        .store-tag.\39 9ranch { background: var(--store-ranch); color: var(--ink); }
        .store-tag.hmart { background: var(--store-hmart); }
        .store-tag.traderjoes { background: var(--store-traderjoes); }
        .deal-match {
            font-size: 0.68rem;
            color: var(--save);
            font-weight: 500;
            margin-top: 0.2rem;
        }
        .deal-dates {
            font-size: 0.68rem;
            color: var(--alert);
            margin-top: 0.1rem;
        }
        .deal-price {
            text-align: right;
            white-space: nowrap;
        }
        .deal-price .current {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem;
            color: var(--ink);
            letter-spacing: -0.02em;
        }
        .deal-price .was {
            font-size: 0.72rem;
            color: var(--ink-muted);
            text-decoration: line-through;
        }
        .deal-price .badge {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            margin-top: 0.2rem;
        }
        .badge-save { background: var(--save-subtle); color: var(--save); }
        .badge-deal { background: var(--alert-subtle); color: var(--alert); }

        /* ── Form Card ── */
        .form-card {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.75rem;
            box-shadow: var(--shadow-sm);
        }
        .form-card h2 {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            color: var(--ink);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 0.65rem;
        }
        .input, .form-card input, .form-card select,
        input.field, select.field {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            padding: 0.5rem 0.7rem;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            width: 100%;
            background: var(--surface);
            color: var(--ink);
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }
        .input:focus, .form-card input:focus, .form-card select:focus,
        input.field:focus, select.field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }
        ::placeholder { color: var(--ink-muted); }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            padding: 0.5rem 1.2rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: all 0.15s var(--ease-out);
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--ink);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--ink-secondary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .btn-accent {
            background: var(--accent);
            color: #fff;
        }
        .btn-accent:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        .btn-ghost {
            background: none;
            color: var(--ink-muted);
            border: 1px solid var(--border-strong);
        }
        .btn-ghost:hover {
            color: var(--ink);
            border-color: var(--ink-muted);
        }
        .btn-danger-text {
            background: none;
            border: none;
            color: var(--ink-muted);
            font-size: 0.75rem;
            padding: 0.3rem 0.5rem;
        }
        .btn-danger-text:hover { color: var(--accent); }

        /* ── List Items ── */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.65rem 0;
            border-bottom: 1px solid var(--border);
            gap: 0.75rem;
        }
        .list-item:last-child { border-bottom: none; }

        /* ── Content Card (for settings, gas, etc) ── */
        .content-card {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem 1.5rem;
            box-shadow: var(--shadow-sm);
        }
        .content-card + .content-card { margin-top: 1rem; }
        .content-card h2 {
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--ink);
            margin-bottom: 0.75rem;
        }
        .content-card p.hint {
            font-size: 0.78rem;
            color: var(--ink-muted);
            margin-top: 0.35rem;
        }

        /* ── Shopping List Items ── */
        .list-check-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.85rem;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            transition: opacity 0.2s, background 0.15s;
        }
        .list-check-item + .list-check-item { margin-top: 0.4rem; }
        .list-check-item.checked {
            opacity: 0.45;
        }
        .list-check-item:hover {
            background: var(--surface-warm);
        }
        .list-check-left {
            display: flex;
            align-items: center;
            gap: 0.65rem;
        }
        .list-check-left input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            accent-color: var(--ink);
        }
        .list-check-left .item-qty {
            font-size: 0.78rem;
            color: var(--ink-muted);
        }

        /* ── Gas Card ── */
        .gas-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 1rem;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            transition: transform 0.15s var(--ease-out), box-shadow 0.15s;
        }
        .gas-card + .gas-card { margin-top: 0.5rem; }
        .gas-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .gas-name { font-weight: 600; font-size: 0.9rem; }
        .gas-address { font-size: 0.78rem; color: var(--ink-muted); margin-top: 0.1rem; }
        .gas-price-val {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
        }
        .gas-price-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-muted);
            text-align: right;
        }
        .gas-cheap { color: var(--save); }
        .gas-mid { color: var(--alert); }
        .gas-exp { color: var(--accent); }

        /* ── Spend Grid ── */
        .spend-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }
        .spend-grid > div {
            background: var(--surface-raised);
            padding: 1.25rem;
        }

        /* ── Watchlist Card ── */
        .watch-card {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            transition: transform 0.15s var(--ease-out), box-shadow 0.15s;
        }
        .watch-card + .watch-card { margin-top: 0.5rem; }
        .watch-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .watch-top {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 1rem;
        }
        .watch-prices { font-size: 0.82rem; text-align: right; }
        .watch-prices strong { font-weight: 600; }

        /* ── Inline form row ── */
        .inline-form {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .inline-form input,
        .inline-form select {
            font-size: 0.82rem;
            padding: 0.45rem 0.7rem;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--ink);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .inline-form input:focus,
        .inline-form select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }
        .inline-form .flex-1 { flex: 1; min-width: 140px; }
        .inline-form .w-20 { width: 5rem; }
        .inline-form .w-24 { width: 6rem; }
        .inline-form .w-28 { width: 7rem; }

        /* ── Alert Boxes ── */
        .alert {
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            margin-bottom: 1.25rem;
        }
        .alert-save {
            background: var(--save-subtle);
            border: 1px solid rgba(26, 122, 52, 0.15);
        }
        .alert-save .alert-text { color: #15572a; font-weight: 600; }
        .alert-warn {
            background: var(--alert-subtle);
            border: 1px solid rgba(196, 122, 10, 0.15);
        }
        .alert-warn h2 { font-weight: 600; color: #7a4d06; margin-bottom: 0.35rem; font-size: 0.88rem; }
        .alert-warn ul { list-style: none; }
        .alert-warn li {
            font-size: 0.82rem;
            color: #8a5908;
            padding: 0.15rem 0;
        }

        /* ── Store group card (plan page) ── */
        .store-plan-card {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .store-plan-card + .store-plan-card { margin-top: 1rem; }
        .store-plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface-warm);
        }
        .store-plan-header h2 {
            font-weight: 700;
            font-size: 0.92rem;
        }
        .store-plan-save { color: var(--save); font-weight: 600; font-size: 0.88rem; }
        .store-plan-deals { padding: 0; }
        .store-plan-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.55rem 1.25rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .store-plan-row:last-child { border-bottom: none; }
        .store-plan-row:hover { background: var(--surface-warm); }
        .store-plan-row .deal-current {
            font-weight: 600;
            color: var(--save);
        }
        .store-plan-row .deal-was {
            color: var(--ink-muted);
            text-decoration: line-through;
            font-size: 0.78rem;
            margin-left: 0.4rem;
        }

        /* ── Savings section items ── */
        .savings-item {
            padding: 0.85rem 0;
            border-bottom: 1px solid var(--border);
        }
        .savings-item:last-child { border-bottom: none; }
        .savings-top {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 1rem;
        }
        .savings-amount {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            color: var(--save);
            white-space: nowrap;
        }
        .savings-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--save);
            text-align: right;
        }
        .savings-detail {
            font-size: 0.72rem;
            color: var(--ink-muted);
            margin-top: 0.2rem;
        }
        .savings-alt { margin-top: 0.2rem; }
        .savings-alt span { margin-right: 0.65rem; }
        .savings-plus { color: var(--save); font-weight: 600; }
        .savings-minus { color: var(--accent); font-weight: 600; }

        /* ── Settings ── */
        .settings-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .settings-group label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--ink-secondary);
            cursor: pointer;
        }
        .settings-group input[type="checkbox"] {
            accent-color: var(--ink);
            width: 0.95rem;
            height: 0.95rem;
        }
        .settings-zones {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .settings-zones input {
            font-size: 0.82rem;
            padding: 0.4rem 0.65rem;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: var(--surface-sunken);
            color: var(--ink-muted);
        }

        /* ── Empty States ── */
        .empty-state {
            text-align: center;
            padding: 3.5rem 1.5rem;
            color: var(--ink-muted);
        }
        .empty-state-icon {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            opacity: 0.7;
        }
        .empty-state p {
            font-size: 0.85rem;
            max-width: 26rem;
            margin: 0 auto;
        }

        /* ── Focus Visible ── */
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        .nav-link:focus-visible {
            outline-color: rgba(255,255,255,0.6);
            outline-offset: -2px;
        }

        /* ── Animate In ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            opacity: 0;
            animation: fadeUp 0.35s var(--ease-out) forwards;
        }
        .animate-in:nth-child(1) { animation-delay: 0ms; }
        .animate-in:nth-child(2) { animation-delay: 25ms; }
        .animate-in:nth-child(3) { animation-delay: 50ms; }
        .animate-in:nth-child(4) { animation-delay: 75ms; }
        .animate-in:nth-child(5) { animation-delay: 100ms; }
        .animate-in:nth-child(n+6) { animation-delay: 120ms; }

        /* ── Reduced Motion ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .animate-in { opacity: 1; }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            .nav-menu {
                display: none;
                position: absolute;
                top: 3.25rem;
                left: 0;
                right: 0;
                background: var(--ink);
                padding: 0.5rem 1rem 1rem;
                border-bottom: 1px solid rgba(255,255,255,0.08);
                flex-direction: column;
            }
            .nav-menu.open { display: flex; }
            .nav-group {
                flex-direction: column;
                align-items: stretch;
                gap: 0;
            }
            .nav-group + .nav-group {
                margin-left: 0;
                padding-left: 0;
                border-left: none;
                margin-top: 0.25rem;
                padding-top: 0.25rem;
                border-top: 1px solid rgba(255,255,255,0.06);
            }
            .nav-link {
                padding: 0.65rem 0.5rem;
                border-bottom: none;
                font-size: 0.78rem;
            }
            .nav-link.active { border-left: 2px solid var(--accent); padding-left: 0.65rem; }
            .nav-spacer { display: none; }

            .page-header {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-bar {
                flex-wrap: wrap;
            }
            .filter-bar input[type="search"] { width: 100%; flex: 1; min-width: 0; }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .spend-grid {
                grid-template-columns: 1fr;
            }
            .deal-card {
                grid-template-columns: 52px 1fr;
                gap: 0.65rem;
            }
            .deal-price {
                grid-column: 2;
                text-align: left;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .deal-price .current { font-size: 1.1rem; }
            .deal-img, .deal-emoji {
                width: 52px;
                height: 52px;
                font-size: 1.25rem;
            }
            .cat-nav { gap: 0.3rem; }
            .cat-pill { font-size: 0.68rem; padding: 0.25rem 0.55rem; }

            .inline-form { flex-direction: column; }
            .inline-form input,
            .inline-form select { width: 100%; }
            .inline-form .w-20,
            .inline-form .w-24,
            .inline-form .w-28 { width: 100%; }

            .settings-group { flex-direction: column; gap: 0.65rem; }
        }

        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .stat-card { padding: 0.85rem 1rem; }
            .stat-value { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">Life<span>Source</span></a>
            <button class="nav-toggle" onclick="document.querySelector('.nav-menu').classList.toggle('open')" aria-label="Menu">☰</button>
            <div class="nav-menu">
                <div class="nav-group">
                    <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Deals</a>
                    <a href="/plan" class="nav-link {% if request.url.path == '/plan' %}active{% endif %}">Plan</a>
                    <a href="/list" class="nav-link {% if request.url.path == '/list' %}active{% endif %}">List</a>
                </div>
                <div class="nav-group">
                    <a href="/purchases" class="nav-link {% if request.url.path == '/purchases' %}active{% endif %}">Purchases</a>
                    <a href="/savings" class="nav-link {% if request.url.path == '/savings' %}active{% endif %}">Savings</a>
                    <a href="/spending" class="nav-link {% if request.url.path == '/spending' %}active{% endif %}">Spending</a>
                </div>
                <div class="nav-group">
                    <a href="/gas" class="nav-link {% if request.url.path == '/gas' %}active{% endif %}">Gas</a>
                    <a href="/watchlist" class="nav-link {% if request.url.path == '/watchlist' %}active{% endif %}">Watch</a>
                </div>
                <span class="nav-spacer"></span>
                <a href="/settings" class="nav-icon {% if request.url.path == '/settings' %}active{% endif %}" title="Settings">⚙</a>
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
        /* Close mobile nav on link click */
        document.querySelectorAll('.nav-link').forEach(function(link) {
            link.addEventListener('click', function() {
                document.querySelector('.nav-menu').classList.remove('open');
            });
        });
        /* Lazy load images with robust error fallback */
        function handleImgError(img) {
            img.style.display = 'none';
            var fallback = img.nextElementSibling;
            if (fallback && fallback.classList.contains('deal-emoji')) {
                fallback.style.display = 'flex';
            }
        }
        if ('IntersectionObserver' in window) {
            var io = new IntersectionObserver(function(entries) {
                entries.forEach(function(e) {
                    if (e.isIntersecting) {
                        var img = e.target;
                        if (img.dataset.src) {
                            img.onerror = function() { handleImgError(img); };
                            img.src = img.dataset.src;
                            img.removeAttribute('data-src');
                        }
                        io.unobserve(img);
                    }
                });
            }, { rootMargin: '200px' });
            document.querySelectorAll('img[data-src]').forEach(function(img) { io.observe(img); });
            /* Re-observe after HTMX swaps */
            document.body.addEventListener('htmx:afterSwap', function() {
                document.querySelectorAll('img[data-src]').forEach(function(img) { io.observe(img); });
            });
        }
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js').catch(function() {});
            });
        }
    </script>
</body>
</html>
